services:
  redis-1:
    image: redis:7.4-alpine
    container_name: redis-1
    restart: always
    # 走 host 網路模式，直接敲主機 Port，效能最好
    network_mode: host  
    environment:
      - REDIS_PASSWORD=${REDIS_PASS}
    configs:
      # ⬇️ 告訴 Docker：我要把下面定義的 config，像檔案一樣塞進容器內的特定路徑
      - source: redis_v1
        target: /usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf

# 🛠️ 這裡就是你的 ConfigMap 區塊！
configs:
  redis_v1:
    inline: |
      # 這裡是你的實體 redis.conf 內容，你想寫幾百行都可以
      port 6379
      bind 0.0.0.0
      protected-mode no
      requirepass MyDefaultPasswordDoNotUse
      appendonly yes
      maxclients 10000
      tcp-keepalive 300