version: '3.8'

services:
  redis-1:
    image: redis:7.4-alpine
    container_name: redis-1
    restart: always
    network_mode: host  # 生產級 host 網路
    environment:
      - REDIS_PASSWORD=${REDIS_PASS}
    configs:
      # ⬇️ 告訴 Docker：我要把下面定義的 config，塞進容器內
      - source: redis_config_v1
        target: /usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf

# 🛠️ 這裡改成寫實體檔案路徑，不要用 inline！
configs:
  redis_config_v1:
    # 🟢 關鍵：因為它跟 docker-compose.yml 都在同一個 node-1 目錄下
    # 直接寫 ./redis.conf，各版本的 Docker Compose 100% 絕對看得懂！
    file: ./redis.conf