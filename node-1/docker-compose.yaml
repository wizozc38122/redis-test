version: '3.8'

services:
  redis-1:
    image: redis:7.4-alpine
    container_name: redis-1
    restart: always
    network_mode: host  # 生產級 host 網路
    # 🟢 核心特技：直接把設定檔的內容，改用參數（Arguments）在啟動時灌進去
    command: >
      redis-server
      --port 6379
      --bind 0.0.0.0
      --protected-mode no
      --requirepass ${REDIS_PASS:-MyDefaultPasswordDoNotUse}
      --appendonly yes
      --maxclients 10000